title: izebit | Blog about programming
author: Artem Konovalov
email: izebit@gmail.com
url: https://izebit.github.io
baseurl: ""
description: >
  This website is a personal blog. Mainly there are articles about
  java programming, but you can find ones on other topics.

permalink: /:slug.html
favicon: "icon.png"

theme_config:
  appearance: "auto"
  back_home_text: "🔙"
  date_format: "%d/%m/%Y"
  show_description: true

sass:
  style: :compressed

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - "*.iml"